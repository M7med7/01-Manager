services:
  - type: web
    name: 01manager-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npx ts-node src/index.ts
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL
        value: gemini-2.5-flash
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
